      - name: type
        label: Подкатегория
        widget: select
        required: false
        options:
          - { label: Вазы, value: 'vases' }
          - { label: Лампады, value: 'lamps' }
          - { label: Крестики, value: 'small-crosses' }
          - { label: Цветы, value: 'flowers' }

singletons:
  # ---------- Страницы ----------
  - name: home
    label: Домашняя страница
    icon: home
    file: /src/data/home.json
    fields:
      - name: hero
        label: Hero (главный экран)
        widget: object
        fields:
          - { label: Заголовок (начало), name: titleStart, widget: string }
          - { label: Заголовок (акцент), name: titleAccent, widget: string }
          - { label: Описание, name: description, widget: text, hint: 'Можно использовать <b>жирный</b>' }
          - name: primaryCta
            label: Основная кнопка
            widget: object
            fields:
              - { label: Текст, name: label, widget: string }
              - { label: Ссылка, name: href, widget: string }
          - name: secondaryCta
            label: Вторичная кнопка
            widget: object
            fields:
              - { label: Текст, name: label, widget: string }
              - { label: Ссылка, name: href, widget: string }
      - name: about
        label: О нас
        widget: object
        fields:
          - { label: Заголовок, name: title, widget: string }
          - { label: Описание, name: description, widget: text }
          - { label: Текст кнопки, name: ctaLabel, widget: string }
          - { label: Ссылка кнопки, name: ctaHref, widget: string }
      - name: advantages
        label: Преимущества
        widget: list
        summary: '{{fields.title}}'
        fields:
          - { label: Заголовок, name: title, widget: string }
          - { label: Описание, name: description, widget: text }
          - name: icon
            label: Иконка
            widget: select
            options:
              - { label: Медаль, value: 'medal' }
              - { label: Завод, value: 'factory' }
              - { label: Знак качества, value: 'badge' }
              - { label: Ключ, value: 'key' }

  - name: sales
    label: Акционные предложения
    icon: local_offer
    file: /src/data/sales.json
    fields:
      - { label: Заголовок секции, name: title, widget: string }
      - name: items
        label: Предложения
        widget: list
        summary: '{{fields.title}} {{fields.discount}}'
        fields:
          - { label: Заголовок, name: title, widget: string }
          - { label: Скидка (акцент), name: discount, widget: string }
          - { label: Описание, name: description, widget: text }
          - { label: Текст кнопки, name: ctaLabel, widget: string }
          - { label: Ссылка кнопки, name: ctaHref, widget: string }

  - divider: true

  # ---------- Прочее ----------
  - name: gallery
    label: Галерея
    icon: photo_library
    file: /src/data/gallery.json
    fields:
      - name: items
        label: Фотографии
        widget: list
        summary: '{{fields.alt}}'
        fields:
          - { label: Изображение, name: image, widget: image, media_folder: /src/assets/gallery }
          - { label: Alt, name: alt, widget: string }

  - name: contacts
    label: Контакты
    icon: contact_mail
    file: /src/data/contacts.json
    fields:
      - { label: Заголовок страницы, name: pageTitle, widget: string }
      - { label: Заголовок адреса, name: addressLabel, widget: string }
      - { label: Адрес, name: address, widget: text, hint: 'Можно указывать адрес в несколько строк' }
      - { label: Заголовок телефонов, name: phoneLabel, widget: string }
      - { label: Телефон (для отображения), name: phoneDisplay, widget: string }
      - { label: Телефон (для ссылки, без символов), name: phoneHref, widget: string, hint: 'Пример: +79106367313' }
      - { label: Заголовок email, name: emailLabel, widget: string }
      - { label: Email, name: email, widget: string }
      - { label: Ссылка на Telegram, name: telegramUrl, widget: string }
      - { label: Ссылка на MAX, name: maxUrl, widget: string }
      - { label: Описание в футере, name: footerDescription, widget: text }
      - name: workingHours
        label: Время работы
        widget: list
        fields:
          - { label: День (или диапазон), name: label, widget: string }
          - { label: Часы, name: value, widget: string }
