# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: somethingxdev/zavet39
  commit_messages:
    create: 'Create {{collection}} «{{slug}}»'
    update: 'Update {{collection}} «{{slug}}»'
    delete: 'Delete {{collection}} «{{slug}}»'

media_folder: /assets

media_libraries:
  default:
    config:
      max_file_size: 1024000
      slugify_filename: true

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: '-'
  lowercase: true

collections:
  # ---------- Услуги ----------
  - name: monuments
    label: Памятники
    label_singular: Памятник
    icon: ad_units
    folder: /src/data/monuments
    create: true
    slug: '{{slug}}'
    editor:
      preview: false
    fields:
      - name: seo
        label: SEO
        widget: object
        required: true
        fields:
          - { label: Title, name: title, widget: string, required: true }
          - { label: Description, name: description, widget: text, required: true }
      - { label: Название, name: title, widget: string }
      - { label: Изображение, name: image, widget: image, media_folder: /src/assets/services/monuments }
      - { label: Материалы, name: materials, widget: text }
      - name: dimensionsAndPrice
        label: Размеры и стоимость
        widget: list
        fields:
          - { label: Размеры, name: dimensions, widget: string }
          - { label: Стоимость, name: price, widget: string }
      - name: type
        label: Подкатегория
        widget: select
        required: false
        options:
          - { label: Вертикальный, value: 'vertical' }
          - { label: Горизонтальный, value: 'horizontal' }
          - { label: Гранитный крест, value: 'granite-cross' }
          - { label: Комбинированный, value: 'combined' }
          - { label: Резной, value: 'carved' }
          - { label: Мраморная крошка, value: 'marble-chips' }

  - name: landscaping
    label: Благоустройство
    label_singular: Благоустройство
    icon: yard
    folder: /src/data/landscaping
    create: true
    slug: '{{slug}}'
    editor:
      preview: false
    fields:
      - name: seo
        label: SEO
        widget: object
        required: true
        fields:
          - { label: Title, name: title, widget: string, required: true }
          - { label: Description, name: description, widget: text, required: true }
      - { label: Название, name: title, widget: string }
      - { label: Изображение, name: image, widget: image, media_folder: /src/assets/services/landscaping }
      - { label: Материалы, name: materials, widget: text }
      - name: dimensionsAndPrice
        label: Размеры и стоимость
        widget: list
        fields:
          - { label: Размеры, name: dimensions, widget: string }
          - { label: Стоимость, name: price, widget: string }
      - name: type
        label: Подкатегория
        widget: select
        required: false
        options:
          - { label: Подиумы, value: 'socles' }
          - { label: Бордюры, value: 'curbs' }

  - name: complexes
    label: Комплексы
    label_singular: Комплекс
    icon: dashboard
    folder: /src/data/complexes
    create: true
    slug: '{{slug}}'
    editor:
      preview: false
    fields:
      - name: seo
        label: SEO
        widget: object
        required: true
        fields:
          - { label: Title, name: title, widget: string, required: true }
          - { label: Description, name: description, widget: text, required: true }
      - { label: Название, name: title, widget: string }
      - { label: Изображение, name: image, widget: image, media_folder: /src/assets/services/complexes }
      - { label: Материалы, name: materials, widget: text }
      - name: dimensionsAndPrice
        label: Размеры и стоимость
        widget: list
        fields:
          - { label: Размеры, name: dimensions, widget: string }
          - { label: Стоимость, name: price, widget: string }
      - name: type
        label: Подкатегория
        widget: select
        required: false
        options:
          - { label: Вертикальные, value: 'vertical' }
          - { label: Горизонтальные, value: 'horizontal' }
          - { label: Гранитные кресты, value: 'granite-cross' }
          - { label: Комбинированные, value: 'combined' }
          - { label: Резные, value: 'carved' }
          - { label: Мраморная крошка, value: 'marble-chips' }

  - name: fences
    label: Ограды
    label_singular: Ограда
    icon: fence
    folder: /src/data/fences
    create: true
    slug: '{{slug}}'
    editor:
      preview: false
    fields:
      - name: seo
        label: SEO
        widget: object
        required: true
        fields:
          - { label: Title, name: title, widget: string, required: true }
          - { label: Description, name: description, widget: text, required: true }
      - { label: Название, name: title, widget: string }
      - { label: Изображение, name: image, widget: image, media_folder: /src/assets/services/fences }
      - { label: Материалы, name: materials, widget: text }
      - name: dimensionsAndPrice
        label: Размеры и стоимость
        widget: list
        fields:
          - { label: Размеры, name: dimensions, widget: string }
          - { label: Стоимость, name: price, widget: string }
      - name: type
        label: Подкатегория
        widget: select
        required: false
        options:
          - { label: Металлические, value: 'metal' }
          - { label: Кованые, value: 'forged' }
          - { label: Гранитные, value: 'granite' }

  - name: benches-and-tables
    label: Лавочки и столики
    label_singular: Лавочка/столик
    icon: chair
    folder: /src/data/benches-and-tables
    create: true
    slug: '{{slug}}'
    editor:
      preview: false
    fields:
      - name: seo
        label: SEO
        widget: object
        required: true
        fields:
          - { label: Title, name: title, widget: string, required: true }
          - { label: Description, name: description, widget: text, required: true }
      - { label: Название, name: title, widget: string }
      - { label: Изображение, name: image, widget: image, media_folder: /src/assets/services/benches-and-tables }
      - { label: Материалы, name: materials, widget: text }
      - name: dimensionsAndPrice
        label: Размеры и стоимость
        widget: list
        fields:
          - { label: Размеры, name: dimensions, widget: string }
          - { label: Стоимость, name: price, widget: string }
      - name: type
        label: Подкатегория
        widget: select
        required: false
        options:
          - { label: Лавочки, value: 'benches' }
          - { label: Столики, value: 'tables' }
          - { label: Комплекты, value: 'sets' }

  - name: crosses
    label: Кресты
    label_singular: Крест
    icon: add
    folder: /src/data/crosses
    create: true
    slug: '{{slug}}'
    editor:
      preview: false
    fields:
      - name: seo
        label: SEO
        widget: object
        required: true
        fields:
          - { label: Title, name: title, widget: string, required: true }
          - { label: Description, name: description, widget: text, required: true }
      - { label: Название, name: title, widget: string }
      - { label: Изображение, name: image, widget: image, media_folder: /src/assets/services/crosses }
      - { label: Материалы, name: materials, widget: text }
      - name: dimensionsAndPrice
        label: Размеры и стоимость
        widget: list
        fields:
          - { label: Размеры, name: dimensions, widget: string }
          - { label: Стоимость, name: price, widget: string }
      - name: type
        label: Подкатегория
        widget: select
        required: false
        options:
          - { label: Гранитный крест, value: 'granite' }
          - { label: Металлический крест, value: 'metal' }

  - name: monument-design
    label: Оформление памятника
    label_singular: Оформление
    icon: brush
    folder: /src/data/monument-design
    create: true
    slug: '{{slug}}'
    editor:
      preview: false
    fields:
      - name: seo
        label: SEO
        widget: object
        required: true
        fields:
          - { label: Title, name: title, widget: string, required: true }
          - { label: Description, name: description, widget: text, required: true }
      - { label: Название, name: title, widget: string }
      - { label: Изображение, name: image, widget: image, media_folder: /src/assets/services/monument-design }
      - { label: Описание, name: materials, widget: text }
      - name: dimensionsAndPrice
        label: Размеры и стоимость
        widget: list
        fields:
          - { label: Размеры, name: dimensions, widget: string }
          - { label: Стоимость, name: price, widget: string }
      - name: type
        label: Подкатегория
        widget: select
        required: false
        options:
          - { label: Гравировка портрета, value: 'portrait-engraving' }
          - { label: Гравировка букв, value: 'letter-engraving' }
          - { label: Шрифты, value: 'fonts' }
          - { label: Буквы из металла, value: 'metal-letters' }
          - { label: Религиозная гравировка, value: 'religious-engraving' }
          - { label: Комплекс гравировки, value: 'engraving-complex' }

  - name: accessories
    label: Аксессуары
    label_singular: Аксессуар
    icon: deployed_code
    folder: /src/data/accessories
    create: true
    slug: '{{slug}}'
    editor:
      preview: false
    fields:
      - name: seo
        label: SEO
        widget: object
        required: true
        fields:
          - { label: Title, name: title, widget: string, required: true }
          - { label: Description, name: description, widget: text, required: true }
      - { label: Название, name: title, widget: string }
      - { label: Изображение, name: image, widget: image, media_folder: /src/assets/services/accessories }
      - { label: Материалы, name: materials, widget: text }
      - name: dimensionsAndPrice
        label: Размеры и стоимость
        widget: list
        fields:
          - { label: Размеры, name: dimensions, widget: string }
