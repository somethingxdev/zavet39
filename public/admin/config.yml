# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
local_backend: true

backend:
  name: github
  repo: user/repo

media_folder: /assets
public_folder: /assets

collections:
  - name: monuments
    label: Памятники
    label_singular: Monument
    folder: /src/content/monuments
    media_folder: /src/assets/services/monuments
    fields:
      - { label: Название, name: title, widget: string }
      - { label: Изображение, name: image, widget: image }
      - { label: Материалы, name: materials, widget: text }
      - { label: Размеры, name: dimensions, widget: string }
      - { label: Стоимость, name: price, widget: string }
      - name: type
        label: Тип
        widget: select
        options:
          - { label: Вертикальный, value: 'vertical' }
          - { label: Горизонтальный, value: 'horizontal' }
          - { label: Гранистый, value: 'faceted' }
          - { label: Комбинированный, value: 'combined' }
      - name: category
        label: Категория
        widget: hidden
        default: 'monuments'
